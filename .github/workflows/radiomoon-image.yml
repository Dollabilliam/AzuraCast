name: Publish RadioMoon Image
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "*.md"
      - ".github/ISSUE_TEMPLATE/*.md"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Publish RadioMoon Image
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    env:
      APPLICATION_ENV: testing
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: intl
          tools: composer:v2

      - name: Cache PHP dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.OS }}-build-${{ hashFiles('composer.lock') }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "lts/jod"
          cache: "npm"

      - name: Prepare workspace
        run: |
          rm -rf web/static/vite_dist
          chmod a+x backend/bin/*

      - name: Install build dependencies
        run: |
          composer install --no-interaction --ignore-platform-reqs --no-progress
          npm ci --include=dev

      - name: Build application assets
        run: |
          npm run build
          backend/bin/console azuracast:api:docs
          bash util/write_git_info.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/azuracast-radiomoon
          flavor: |
            latest=false
          tags: |
            type=raw,value=radiomoon,enable=${{ github.ref_name == github.event.repository.default_branch }}
            type=sha,prefix=git-

      - name: Build and publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
